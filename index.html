<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réseau Social</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <script>
        // Redirection automatique selon l'état de connexion (sessionStorage)
        const utilisateur = sessionStorage.getItem('utilisateur');
        if (utilisateur) {
            window.location.href = 'vues/clients/accueil.html';
        } else {
            window.location.href = 'vues/clients/connexion.html';
        }
    </script>
</body>
</html>
