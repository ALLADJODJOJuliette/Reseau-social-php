    <h1>Gestion des rôles</h1>

<div id="nav"></div>

    <form id="formulaire-nouvel-admin" onsubmit="event.preventDefault(); creerAdmin();">
        <h3>Créer un nouveau modérateur/administrateur</h3>
        <input type="text" id="nouveau-nom" placeholder="Nom" required>
        <input type="text" id="nouveau-prenom" placeholder="Prénom" required>
        <input type="email" id="nouveau-email" placeholder="Email" required>
        <input type="password" id="nouveau-mdp" placeholder="Mot de passe" required>
        <select id="nouveau-role">
            <option value="moderateur">Modérateur</option>
            <option value="administrateur">Administrateur</option>
        </select>
        <button type="submit">Créer le compte</button>
    </form>

<h2>Utilisateurs simples</h2>
    <table id="tableau-users">
        <thead>
            <tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Action</th></tr>
        </thead>
        <tbody id="corps-users"></tbody>
    </table>

    <h2>Modérateurs</h2>
    <table id="tableau-moderateurs">
        <thead>
            <tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Action</th></tr>
        </thead>
        <tbody id="corps-moderateurs"></tbody>
    </table>

    <h2>Administrateurs</h2>
    <table id="tableau-administrateurs">
        <thead>
            <tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Action</th></tr>
        </thead>
        <tbody id="corps-administrateurs"></tbody>
    </table>

    <script src="../../assets/js/nav.js"></script>
    <script src="../../assets/js/admins.js"></script>
</body>
</html>
